<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollin' 18</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden; background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
    position: relative;
  }

  :root {
    --orange: #ff6a00;
    --dark: rgba(15,15,20,0.75);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.55);
  }

  /* ── Shared box style ── */
  .box {
    position: absolute;
    background: var(--dark);
    border-radius: 16px;
    padding: 10px 18px 10px 14px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .box-label {
    font-family: 'Barlow', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-dim); line-height: 1; margin-bottom: 4px;
  }
  .box-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px; font-weight: 700;
    color: var(--orange); line-height: 1;
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  }
  .box-sub {
    font-size: 14px; font-weight: 400;
    color: var(--text-dim); letter-spacing: 0.12em; margin-top: 3px;
  }

  /* ── TOP LEFT: Time ── */
  #box-time { top: 28px; left: 28px; min-width: 220px; }
  #box-time .box-value { font-size: 52px; }

  /* ── TOP RIGHT: Pac-Man Heading ── */
  #box-heading {
    top: 28px; right: 28px;
    text-align: center; width: 200px; height: 200px;
    border-radius: 16px;
    padding: 12px 16px 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #pacman-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  #pacman-svg { width: 100px; height: 100px; }
  #heading-label {
    font-size: 24px; font-weight: 700;
    color: var(--orange); letter-spacing: 0.08em;
  }
  #box-location {
    bottom: 28px; left: 28px;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px;
    max-width: 800px;
  }
  .loc-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 8px rgba(255,106,0,0.6);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1; box-shadow:0 0 8px rgba(255,106,0,0.6);} 50%{opacity:0.6; box-shadow:0 0 3px rgba(255,106,0,0.3);} }
  #box-location .loc-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px; font-weight: 700;
    color: var(--orange); line-height: 1;
  }

  /* ── BOTTOM RIGHT: Temp ── */
  #box-temp {
    bottom: 28px; right: 28px;
    text-align: right;
  }
  #box-temp .box-value { font-size: 52px; }

  /* status dot */
  .sdot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #444; margin-left: 6px; vertical-align: middle;
    transition: background 0.4s;
  }
  .sdot.active { background: var(--orange); box-shadow: 0 0 5px var(--orange); }
  .sdot.error  { background: #f87171; }
  .sdot.searching { background: #f59e0b; animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>

<!-- Top Left: Time -->
<div class="box" id="box-time">
  <div class="box-label">Time</div>
  <div class="box-value" id="val-time">--:-- --</div>
  <div class="box-sub" id="val-tz">--</div>
</div>

<!-- Top Right: Pac-Man Heading -->
<div class="box" id="box-heading">
  <div class="box-label">Heading</div>
  <div id="pacman-wrap">
    <svg id="pacman-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <!-- Everything rotates around center 80,80 -->
      <g id="pacman-group" transform="rotate(0, 80, 80)">
        <!-- Pac-Man body: full circle minus mouth wedge, facing UP (north) -->
        <!-- Mouth opens upward: from center 80,80, mouth points toward top -->
        <path id="pacman-body" d="M80,80 L62,32 A50,50 0 1,0 98,32 Z" fill="#f5c518"/>
        <!-- Eye: offset to right of mouth direction -->
        <circle cx="100" cy="52" r="6" fill="#1a1a1a"/>
        <!-- Dots leading upward away from mouth -->
        <circle cx="80" cy="18"  r="4"   fill="#ffffff" opacity="0.6"/>
        <circle cx="80" cy="6"   r="5"   fill="#ffffff" opacity="0.8"/>
        <!-- Arrow at very top -->
        <polygon points="80,0 72,12 80,8 88,12" fill="#ff6a00"/>
      </g>
    </svg>
    <div id="heading-label">-- °</div>
  </div>
</div>

<!-- Bottom Left: Location -->
<div class="box" id="box-location">
  <div class="loc-dot"></div>
  <div class="loc-text" id="val-location">Locating...</div>
</div>

<!-- Bottom Right: Temp -->
<div class="box" id="box-temp">
  <div class="box-label">Temperature <span class="sdot searching" id="dot-temp"></span></div>
  <div class="box-value" id="val-temp">--°F</div>
</div>

<script>
  function scale() {
    var s=Math.min(window.innerWidth/1920,window.innerHeight/1080);
    document.body.style.transform='scale('+s+')';
    document.body.style.transformOrigin='top left';
    document.body.style.width='1920px';
    document.body.style.height='1080px';
  }
  scale(); window.addEventListener('resize',scale);

  var lat=null,lon=null,isMoving=false;
  var lastTemp=0,lastGeo=0,lastElev=0,lastTz=0;
  var userTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;

  var chompOpen = true;
  setInterval(function() {
    chompOpen = !chompOpen;
    var body = document.getElementById('pacman-body');
    if(!body) return;
    if(chompOpen) {
      body.setAttribute('d', 'M80,80 L62,32 A50,50 0 1,0 98,32 Z');
    } else {
      body.setAttribute('d', 'M80,80 L70,32 A50,50 0 1,0 90,32 Z');
    }
  }, 250);

  function degToCompass(d){
    return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
  }

  function updateHeading(heading) {
    if(heading == null || heading < 0) return;
    document.getElementById('pacman-group').setAttribute('transform', 'rotate('+heading+', 80, 80)');
    document.getElementById('heading-label').textContent = degToCompass(heading) + '  ' + Math.round(heading) + '°';
  }

  // Clock
  function tick(){
    var now=new Date();
    var opts={hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true,timeZone:userTZ};
    var pts=Intl.DateTimeFormat('en-US',opts).formatToParts(now);
    var get=function(t){return(pts.find(function(p){return p.type===t;})||{}).value||'--';};
    var ap=(pts.find(function(p){return p.type==='dayperiod'||p.type==='dayPeriod';})||{}).value||'';
    var tz=(Intl.DateTimeFormat('en-US',{timeZoneName:'short',timeZone:userTZ}).formatToParts(now).find(function(p){return p.type==='timeZoneName';})||{}).value||'';
    document.getElementById('val-time').textContent=get('hour')+':'+get('minute')+':'+get('second')+' '+ap;
    document.getElementById('val-tz').textContent=tz;
  }
  tick(); setInterval(tick,1000);

  // Elevation
  function fetchElev(lt,ln){
    if(Date.now()-lastElev<15000) return; lastElev=Date.now();
    fetch('https://api.open-meteo.com/v1/elevation?latitude='+lt+'&longitude='+ln)
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.elevation&&d.elevation[0]!=null){
          document.getElementById('val-elev').textContent=Math.round(d.elevation[0]*3.28084).toLocaleString();
          document.getElementById('dot-elev').className='sdot active';
        }
      }).catch(function(){document.getElementById('dot-elev').className='sdot error';});
  }

  // Weather
  function fetchWeather(lt,ln){
    if(Date.now()-lastTemp<5*60*1000) return; lastTemp=Date.now();
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lt+'&longitude='+ln+'&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r){return r.json();})
      .then(function(d){
        var f=Math.round(d.current_weather.temperature);
        document.getElementById('val-temp').textContent=f+'°F';
        document.getElementById('dot-temp').className='sdot active';
      }).catch(function(){document.getElementById('dot-temp').className='sdot error';});
  }

  // Geocode
  function fetchGeo(lt,ln){
    if(Date.now()-lastGeo<30000) return; lastGeo=Date.now();
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lt+'&lon='+ln+'&format=json')
      .then(function(r){return r.json();})
      .then(function(d){
        var a=d.address;
        window._street=a.road||a.pedestrian||a.county||'';
        var city=a.city||a.town||a.village||a.county||'';
        var state=a.state_code||a.state||'';
        window._city=city+(city&&state?', ':'')+state;
        updateLoc();
      }).catch(function(){});
  }

  function updateLoc(){
    var el=document.getElementById('val-location');
    el.style.background='';
    el.style.webkitBackgroundClip='';
    el.style.webkitTextFillColor='';
    el.style.backgroundClip='';
    if(!isMoving){
      el.textContent='Somewhere USA 🇺🇸';
    } else {
      var loc=(window._street||'')+(window._street&&window._city?' · ':'')+(window._city||'');
      el.textContent=loc||'Locating...';
    }
  }

  // Timezone
  function fetchTZ(lt,ln){
    if(Date.now()-lastTz<5*60*1000) return; lastTz=Date.now();
    fetch('https://timeapi.io/api/TimeZone/coordinate?latitude='+lt+'&longitude='+ln)
      .then(function(r){return r.json();})
      .then(function(d){if(d.timeZone) userTZ=d.timeZone;})
      .catch(function(){});
  }

  // GPS
  function onPos(pos){
    var c=pos.coords;
    lat=c.latitude; lon=c.longitude;
    var mph=(c.speed!=null&&c.speed>=0)?Math.round(c.speed*2.23694):0;
    isMoving=mph>=2;

    if(c.heading!=null) updateHeading(c.heading);
    fetchWeather(lat,lon);
    fetchGeo(lat,lon);
    fetchTZ(lat,lon);
    updateLoc();
  }

  function onErr(e){
    var msg=e?(e.code===1?'Location denied':e.code===2?'GPS unavailable':'GPS timeout'):'GPS Error';
    document.getElementById('val-location').textContent=msg;
    document.getElementById('dot-temp').className='sdot error';
  }

  window.addEventListener('load',function(){
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,timeout:30000,maximumAge:0});
    } else { onErr(null); }
  });
</script>
</body>
</html>
