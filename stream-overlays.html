<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollin' 18</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden; background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
    position: relative;
  }

  :root {
    --yellow: #f5c518;
    --dark: rgba(15,15,20,0.80);
    --dark-solid: rgba(10,10,14,0.95);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.55);
  }

  /* ── MAP top right ── */
  #map-panel {
    position: absolute; top: 0; right: 0;
    width: 420px; height: 300px;
    background: var(--dark);
    border-left: 3px solid var(--yellow);
    border-bottom: 3px solid var(--yellow);
    border-bottom-left-radius: 48px;
    overflow: hidden;
  }
  .map-header {
    position: absolute; top: 0; left: 0; right: 0; height: 32px;
    background: var(--dark-solid);
    border-bottom: 1px solid rgba(245,197,24,0.3);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; z-index: 10;
  }
  .map-title { font-size:11px; font-weight:700; letter-spacing:0.2em; color:var(--yellow); text-transform:uppercase; }
  .map-timer-wrap { display:flex; align-items:center; gap:6px; }
  .map-timer-label { font-size:11px; color:var(--text-dim); }
  .timer-ring { width:18px; height:18px; }
  .timer-ring circle { fill:none; stroke:rgba(245,197,24,0.2); stroke-width:3; }
  .timer-ring .progress {
    stroke:var(--yellow); stroke-dasharray:44; stroke-dashoffset:0;
    stroke-linecap:round; transform:rotate(-90deg); transform-origin:center;
    transition:stroke-dashoffset 1s linear;
  }
  .map-content {
    position:absolute; top:32px; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center;
  }
  .map-content iframe { width:100%; height:100%; border:none; pointer-events:none; }
  .map-placeholder { color:rgba(245,197,24,0.4); font-size:12px; letter-spacing:0.15em; text-align:center; }
  .nesw {
    position:absolute; z-index:10; font-size:12px; font-weight:700; color:var(--yellow);
    pointer-events:none; text-shadow:0 1px 5px rgba(0,0,0,0.95);
  }
  .nesw.n { top:36px; left:50%; transform:translateX(-50%); }
  .nesw.s { bottom:6px; left:50%; transform:translateX(-50%); }
  .nesw.e { right:6px; top:50%; transform:translateY(-50%); margin-top:16px; }
  .nesw.w { left:6px; top:50%; transform:translateY(-50%); margin-top:16px; }

  /* ── BOTTOM BAR ── */
  #bottom-bar {
    position:absolute; bottom:0; left:0; right:0; height:95px;
    background:var(--dark);
    border-top:2px solid rgba(245,197,24,0.4);
    display:flex; align-items:stretch; overflow:hidden;
  }
  /* diagonal stripe texture */
  #bottom-bar::after {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(
      -45deg,
      rgba(180,20,20,0.10) 0px, rgba(180,20,20,0.10) 3px,
      transparent 3px, transparent 10px
    );
    pointer-events:none;
  }
  .bar-section {
    flex:1; display:flex; flex-direction:column;
    justify-content:center; padding:0 28px;
    border-right:1px solid rgba(255,255,255,0.1);
    position:relative; z-index:1;
  }
  .bar-section:last-child { border-right:none; }
  .bar-section.center { flex:2; align-items:center; text-align:center; }
  .bar-label {
    font-family:'Barlow',sans-serif;
    font-size:10px; font-weight:600;
    letter-spacing:0.20em; text-transform:uppercase;
    color:var(--yellow); opacity:0.75;
    line-height:1; margin-bottom:3px;
  }
  .bar-val {
    font-family:'Barlow Condensed',sans-serif;
    font-size:32px; font-weight:700;
    color:var(--text); line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .loc-dot {
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--yellow); margin-right:8px; vertical-align:middle;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @keyframes mapFade { from{opacity:0} to{opacity:1} }
  .map-fading { animation:mapFade 0.7s ease both; }
</style>
</head>
<body>

<!-- Top Right: Map -->
<div id="map-panel">
  <div class="map-header">
    <span class="map-title" id="map-title">Awaiting GPS...</span>
    <div class="map-timer-wrap">
      <span class="map-timer-label" id="timer-label">--s</span>
      <svg class="timer-ring" viewBox="0 0 18 18">
        <circle cx="9" cy="9" r="7"/>
        <circle class="progress" id="timer-progress" cx="9" cy="9" r="7"/>
      </svg>
    </div>
  </div>
  <div class="map-content" id="map-content">
    <div class="map-placeholder">AWAITING GPS...</div>
  </div>
  <span class="nesw n">N</span>
  <span class="nesw s">S</span>
  <span class="nesw e">E</span>
  <span class="nesw w">W</span>
</div>

<!-- Bottom Bar -->
<div id="bottom-bar">
  <div class="bar-section">
    <div class="bar-label">Temp <span id="dot-temp" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#444;vertical-align:middle;margin-left:3px"></span></div>
    <div class="bar-val" id="val-temp">--°F</div>
    <div class="bar-val" style="font-size:18px;color:var(--text-dim)" id="val-temp-c">-- °C</div>
  </div>
  <div class="bar-section center">
    <div class="bar-label">Location</div>
    <div class="bar-val"><span class="loc-dot"></span><span id="val-city">--</span></div>
  </div>
  <div class="bar-section center">
    <div class="bar-label">Street</div>
    <div class="bar-val" id="val-street">Locating...</div>
  </div>
  <div class="bar-section" style="align-items:flex-end">
    <div class="bar-label">Time</div>
    <div class="bar-val" id="val-time-bar">--:-- --</div>
    <div class="bar-val" style="font-size:16px;color:var(--text-dim)" id="val-tz-bar">--</div>
  </div>
</div>

<script>
  // Scale to fit
  function scale() {
    var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    document.body.style.transform = 'scale('+s+')';
    document.body.style.transformOrigin = 'top left';
    document.body.style.width  = '1920px';
    document.body.style.height = '1080px';
  }
  scale();
  window.addEventListener('resize', scale);

  var lat=null, lon=null, isMoving=false, mapStarted=false;
  var mapIndex=0, mapCountdown=0, mapInterval=null;
  var stoppedIndex=0, stoppedCountdown=0, stoppedInterval=null;
  var lastTemp=0, lastGeo=0, lastTz=0;
  var CIRC=2*Math.PI*7;
  var userTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;

  // Home zone — ZIP 19355 Malvern PA — map hides State/Street within 1 mile
  var HOME_LAT = 40.0423;
  var HOME_LON = -75.5135;
  var HOME_RADIUS_MILES = 1.0;

  function distanceMiles(lat1, lon1, lat2, lon2) {
    var R = 3958.8; // Earth radius in miles
    var dLat = (lat2-lat1) * Math.PI/180;
    var dLon = (lon2-lon1) * Math.PI/180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function isNearHome() {
    if(!lat||!lon) return false;
    return distanceMiles(lat, lon, HOME_LAT, HOME_LON) <= HOME_RADIUS_MILES;
  }

  var MAP_HOME=[
    {name:'USA View',   span:28.0, dur:7},
    {name:'State View', span:1.8,  dur:10}
  ];
  var MAP_MOVE=[
    {name:'USA View',   span:28.0,  dur:7},
    {name:'State View', span:1.8,   dur:10},
    {name:'Street View',span:0.003, dur:15}
  ];
  var MAP_STOP=[
    {name:'USA View',  span:28.0, dur:7},
    {name:'State View',span:1.8,  dur:10}
  ];

  // Clock
  function tick() {
    var now=new Date();
    var opts={hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true,timeZone:userTZ};
    var pts=Intl.DateTimeFormat('en-US',opts).formatToParts(now);
    var get=function(t){return(pts.find(function(p){return p.type===t;})||{}).value||'--';};
    var ap=(pts.find(function(p){return p.type==='dayperiod'||p.type==='dayPeriod';})||{}).value||'';
    var timeStr=get('hour')+':'+get('minute')+':'+get('second')+' '+ap;
    var tz=(Intl.DateTimeFormat('en-US',{timeZoneName:'short',timeZone:userTZ}).formatToParts(now).find(function(p){return p.type==='timeZoneName';})||{}).value||'';
    document.getElementById('val-time-bar').textContent=timeStr;
    document.getElementById('val-tz-bar').textContent=tz;
  }
  tick(); setInterval(tick,1000);

  // Map
  function renderMap(lt,ln,v) {
    var url='https://www.openstreetmap.org/export/embed.html?bbox='+(ln-v.span)+','+(lt-v.span*0.75)+','+(ln+v.span)+','+(lt+v.span*0.75)+'&layer=mapnik&marker='+lt+','+ln;
    var el=document.getElementById('map-content');
    el.classList.remove('map-fading'); void el.offsetWidth; el.classList.add('map-fading');
    el.innerHTML='<iframe src="'+url+'" scrolling="no"></iframe>';
    document.getElementById('map-title').textContent=v.name;
  }
  function setRing(cd,total) {
    var p=document.getElementById('timer-progress');
    p.style.strokeDasharray=CIRC; p.style.strokeDashoffset=CIRC*(1-cd/total);
    document.getElementById('timer-label').textContent=cd+'s';
  }
  function startMap() {
    if(!lat) return;
    if(mapInterval){clearInterval(mapInterval);mapInterval=null;}
    if(stoppedInterval){clearInterval(stoppedInterval);stoppedInterval=null;}

    // Near home — show USA view only for privacy
    if(isNearHome()) {
      document.getElementById('map-title').textContent='USA View';
      renderMap(lat,lon,MAP_HOME[0]);
      setRing(MAP_HOME[0].dur, MAP_HOME[0].dur);
      stoppedInterval=setInterval(function(){
        renderMap(lat,lon,MAP_HOME[0]);
        setRing(MAP_HOME[0].dur, MAP_HOME[0].dur);
      }, MAP_HOME[0].dur*1000);
      return;
    }

    if(!isMoving) {
      stoppedIndex=0; stoppedCountdown=MAP_STOP[0].dur;
      renderMap(lat,lon,MAP_STOP[stoppedIndex]); setRing(stoppedCountdown,MAP_STOP[stoppedIndex].dur);
      stoppedInterval=setInterval(function(){
        stoppedCountdown--; setRing(stoppedCountdown,MAP_STOP[stoppedIndex].dur);
        if(stoppedCountdown<=0){stoppedIndex=(stoppedIndex+1)%MAP_STOP.length;stoppedCountdown=MAP_STOP[stoppedIndex].dur;renderMap(lat,lon,MAP_STOP[stoppedIndex]);}
      },1000);
    } else {
      mapIndex=0; mapCountdown=MAP_MOVE[0].dur;
      renderMap(lat,lon,MAP_MOVE[mapIndex]); setRing(mapCountdown,MAP_MOVE[mapIndex].dur);
      mapInterval=setInterval(function(){
        mapCountdown--; setRing(mapCountdown,MAP_MOVE[mapIndex].dur);
        if(mapCountdown<=0){mapIndex=(mapIndex+1)%MAP_MOVE.length;mapCountdown=MAP_MOVE[mapIndex].dur;renderMap(lat,lon,MAP_MOVE[mapIndex]);}
      },1000);
    }
  }

  // Weather
  function fetchWeather(lt,ln) {
    if(Date.now()-lastTemp<5*60*1000) return; lastTemp=Date.now();
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lt+'&longitude='+ln+'&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r){return r.json();})
      .then(function(d){
        var f=Math.round(d.current_weather.temperature);
        document.getElementById('val-temp').textContent=f+'°F';
        document.getElementById('val-temp-c').textContent=Math.round((f-32)*5/9)+' °C';
        document.getElementById('dot-temp').style.background='#f5c518';
      }).catch(function(){document.getElementById('dot-temp').style.background='#f87171';});
  }

  // Geocode
  function fetchGeo(lt,ln) {
    if(Date.now()-lastGeo<30000) return; lastGeo=Date.now();
    if(isNearHome()) { updateLoc(); return; }
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lt+'&lon='+ln+'&format=json')
      .then(function(r){return r.json();})
      .then(function(d){
        var a=d.address;
        window._street=a.road||a.pedestrian||a.county||'';
        var city=a.city||a.town||a.village||a.county||'';
        var state=a.state_code||a.state||'';
        window._city=city+(city&&state?', ':'')+state;
        updateLoc();
      }).catch(function(){});
  }

  function updateLoc() {
    var se=document.getElementById('val-street');
    var ce=document.getElementById('val-city');
    var atHome = isNearHome() || (window._city && window._city.toLowerCase().indexOf('malvern') >= 0);
    if(atHome) {
      if(se) se.style.cssText='font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(90deg,#ff6a00,#cc0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;';
      if(se) se.textContent='WE ARE HOME 🏠';
      if(ce) ce.textContent='';
    } else {
      if(se) se.style.cssText='';
      if(se) se.textContent=isMoving?(window._street||'Locating...'):'Somewhere USA 🇺🇸';
      if(ce) ce.textContent=window._city||'--';
    }
  }

  // Timezone
  function fetchTZ(lt,ln) {
    if(Date.now()-lastTz<5*60*1000) return; lastTz=Date.now();
    fetch('https://timeapi.io/api/TimeZone/coordinate?latitude='+lt+'&longitude='+ln)
      .then(function(r){return r.json();})
      .then(function(d){if(d.timeZone) userTZ=d.timeZone;})
      .catch(function(){});
  }

  // GPS
  function onPos(pos) {
    var c=pos.coords;
    lat=c.latitude; lon=c.longitude;
    var mph=(c.speed!=null&&c.speed>=0)?Math.round(c.speed*2.23694):0;
    var was=isMoving; isMoving=mph>=2;
    fetchWeather(lat,lon);
    fetchGeo(lat,lon);
    fetchTZ(lat,lon);
    updateLoc();
    if(!mapStarted){mapStarted=true;startMap();}
    else if(was!==isMoving){startMap();}
  }

  function onErr(e) {
    var msg=e?(e.code===1?'Location denied':e.code===2?'GPS unavailable':'GPS timeout'):'GPS Error';
    document.getElementById('val-street').textContent=msg;
    document.getElementById('val-city').textContent='Check settings';
    document.getElementById('dot-temp').style.background='#f87171';
  }

  // Auto-start GPS on load
  window.addEventListener('load', function() {
    if(navigator.geolocation) {
      navigator.geolocation.watchPosition(onPos, onErr, {
        enableHighAccuracy:true, timeout:30000, maximumAge:0
      });
    } else { onErr(null); }
  });
</script>
</body>
</html>
