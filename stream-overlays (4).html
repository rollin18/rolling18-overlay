<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollin' 18 Stream Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Rajdhani', sans-serif;
    position: relative;
  }

  :root {
    --orange: #ffffff;
    --orange-glow: rgba(255,255,255,0.3);
    --orange-dim: rgba(255,255,255,0.85);
    --dark: rgba(10, 8, 6, 0.55);
    --dark-solid: rgba(12,9,6,0.70);
    --border: rgba(255,255,255,0.25);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.65);
    --accent: #ff6a00;
    --stripe: repeating-linear-gradient(
      -55deg,
      rgba(255,106,0,0.07) 0px, rgba(255,106,0,0.07) 3px,
      transparent 3px, transparent 10px
    );
  }

  /* ══════════════════════════════════════
     MAP — top RIGHT corner, flush
  ══════════════════════════════════════ */
  #map-panel {
    position: absolute;
    top: 0; right: 0;
    width: 380px; height: 280px;
    background: rgba(10,8,6,0.55);
    border-left: 3px solid var(--accent);
    border-bottom: 3px solid var(--accent);
    border-bottom-left-radius: 48px;
    overflow: hidden;
  }
  .map-header {
    position: absolute;
    top: 0; left: 0; right: 0; height: 30px;
    background: var(--dark-solid);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 12px; z-index: 10;
  }
  .map-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
  }
  .map-timer-wrap { display: flex; align-items: center; gap: 6px; }
  .map-timer-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }
  .timer-ring { width: 18px; height: 18px; }
  .timer-ring circle { fill: none; stroke: rgba(255,106,0,0.2); stroke-width: 3; }
  .timer-ring .progress {
    stroke: var(--accent); stroke-dasharray: 44; stroke-dashoffset: 0;
    stroke-linecap: round; transform: rotate(-90deg); transform-origin: center;
    transition: stroke-dashoffset 1s linear;
  }
  .map-content {
    position: absolute; top: 30px; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .map-content iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
  .map-placeholder {
    color: var(--orange-dim); font-size: 12px;
    letter-spacing: 0.15em; text-align: center; line-height: 2;
  }
  .nesw {
    position: absolute; z-index: 10;
    font-size: 11px; font-weight: 700; color: var(--accent);
    pointer-events: none; text-shadow: 0 1px 5px rgba(0,0,0,0.95);
  }
  .nesw.n { top: 34px;  left: 50%; transform: translateX(-50%); }
  .nesw.s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .nesw.e { right: 5px; top: 50%; transform: translateY(-50%); margin-top: 15px; }
  .nesw.w { left: 5px;  top: 50%; transform: translateY(-50%); margin-top: 15px; }

  

  /* ══════════════════════════════════════
     TOP LEFT — Clock flush to corner
  ══════════════════════════════════════ */
  #clock-block {
    position: absolute;
    top: 0; left: 0;
    background: var(--dark);
    border-right: 3px solid var(--accent);
    border-bottom: 3px solid var(--accent);
    border-bottom-right-radius: 48px;
    padding: 12px 24px 12px 18px;
    min-width: 240px;
  }
  #clock-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; color: var(--text);
    line-height: 0.95; letter-spacing: 0.05em; font-variant-numeric: tabular-nums;
  }
  #clock-date {
    font-size: 14px; font-weight: 600;
    color: var(--text); letter-spacing: 0.2em;
    text-transform: uppercase; margin-top: 5px;
  }
  #clock-tz {
    font-size: 11px; font-weight: 400;
    color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase;
  }

  /* ══════════════════════════════════════
     CHANNEL BRANDING — inside bottom bar
  ══════════════════════════════════════ */
  #brand-shadow-box {
    padding: 4px 14px 6px 14px;
    border-radius: 6px;
    background: rgba(0,0,0,0.50);
    border: 2px solid var(--accent);
    box-shadow:
      0 0 0 3px rgba(0,0,0,0.7),
      0 0 14px rgba(255,106,0,0.4),
      0 0 30px rgba(255,106,0,0.15);
    display: inline-block;
  }
  #brand-name {
    font-family: 'Pacifico', cursive;
    font-size: 46px; color: var(--orange);
    letter-spacing: 0.02em; line-height: 1;
    text-shadow:
      -2px -2px 0 #000,  2px -2px 0 #000,
      -2px  2px 0 #000,  2px  2px 0 #000,
       0px  3px 0 #000,
       0 0 16px rgba(245,197,24,0.7), 0 0 30px rgba(245,197,24,0.3);
  }
  #brand-tagline {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.35em; color: #f5c518;
    text-transform: uppercase; margin-top: 2px;
    text-align: center; opacity: 0.8;
  }

  /* ══════════════════════════════════════
     BOTTOM BAR
  ══════════════════════════════════════ */
  #bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 95px;
    background: rgba(10,8,6,0.82);
    border-top: 3px solid var(--accent);
    display: flex; align-items: stretch;
    overflow: hidden;
  }
  #bottom-bar::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 5px;
    background: var(--accent); box-shadow: 0 0 14px rgba(255,106,0,0.35);
    z-index: 3;
  }
  .bar-col {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 0 22px;
    border-right: 1px solid rgba(255,255,255,0.15);
    position: relative; z-index: 2;
  }
  .bar-col:last-child { border-right: none; }
  .bar-col.wide { flex: 3; }
  .bar-col.center { align-items: center; text-align: center; }
  .bar-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.22em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 1px;
  }
  .bar-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px; color: var(--text);
    line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
  }

  .loc-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px rgba(255,106,0,0.35);
    margin-right: 8px; flex-shrink: 0;
    animation: pulse-dot 2s ease-in-out infinite; vertical-align: middle;
  }
  @keyframes pulse-dot {
    0%,100%{ box-shadow: 0 0 8px rgba(255,106,0,0.35); }
    50%    { box-shadow: 0 0 2px rgba(255,106,0,0.35); }
  }

  /* ── Animations ── */
  @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes mapFade { from{opacity:0} to{opacity:1} }
  .map-fading { animation: mapFade 0.7s ease both; }

  /* ══════════════════════════════════════
     GPS PROMPT
  ══════════════════════════════════════ */
  #gps-prompt {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px; padding: 40px;
    text-align: center; background: rgba(0,0,0,0.95); z-index: 999;
  }
  #gps-prompt h2 {
    font-family: 'Pacifico', cursive;
    font-size: 72px; color: var(--orange); letter-spacing: 0.04em;
    text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
      0 0 20px rgba(245,197,24,0.6);
  }
  #gps-prompt p {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; color: var(--text-dim);
    max-width: 380px; line-height: 1.7;
  }
  #gps-prompt button {
    background: var(--orange); color: #000;
    border: none; border-radius: 5px; padding: 16px 48px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; letter-spacing: 0.14em; cursor: pointer;
    box-shadow: 0 0 28px var(--orange-glow);
  }
  #gps-prompt.hidden { display: none; }
</style>
</head>
<body>

<script>
  function scaleToFit() {
    const scale = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    document.body.style.transform = `scale(${scale})`;
    document.body.style.transformOrigin = 'top left';
    // Fix GPS prompt to always fill actual screen regardless of scale
    const p = document.getElementById('gps-prompt');
    if (p) {
      p.style.transform = `scale(${1/scale})`;
      p.style.transformOrigin = 'top left';
      p.style.width = window.innerWidth + 'px';
      p.style.height = window.innerHeight + 'px';
    }
  }
  window.addEventListener('load', scaleToFit);
  window.addEventListener('resize', scaleToFit);
</script>

<!-- GPS Prompt -->
<div id="gps-prompt">
  <h2>Rollin' 18</h2>
  <p>Tap below then tap <strong style="color:#fff">Allow</strong> when iOS asks for location.</p>
  <button id="start-btn">ENABLE GPS</button>
</div>

<!-- Top Left: Clock -->
<div id="clock-block">
  <div id="clock-time">--:-- --</div>
  <div id="clock-date">-- --- ----</div>
  <div id="clock-tz">--</div>
</div>

<!-- Top Right: Map flush to corner -->
<div id="map-panel">
  <div class="map-header">
    <span class="map-title" id="map-title">Awaiting GPS...</span>
    <div class="map-timer-wrap">
      <span class="map-timer-label" id="timer-label">--s</span>
      <svg class="timer-ring" viewBox="0 0 18 18">
        <circle cx="9" cy="9" r="7"/>
        <circle class="progress" id="timer-progress" cx="9" cy="9" r="7"/>
      </svg>
    </div>
  </div>
  <div class="map-content" id="map-content">
    <div class="map-placeholder">AWAITING GPS...</div>
  </div>
  <span class="nesw n">N</span>
  <span class="nesw s">S</span>
  <span class="nesw e">E</span>
  <span class="nesw w">W</span>
</div>


<!-- Bottom Bar -->
<div id="bottom-bar">

  <!-- Temp — far left -->
  <div class="bar-col" style="flex:1.2">
    <div class="bar-label">Temp <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#333;vertical-align:middle;margin-left:4px" id="dot-temp"></span></div>
    <div class="bar-val">
      <span id="val-temp-f">--</span><span style="font-size:12px;color:var(--text-dim);margin-left:2px">°F</span>
      <span style="font-size:16px;color:var(--text-dim);margin:0 5px">/</span>
      <span id="val-temp-c">--</span><span style="font-size:12px;color:var(--text-dim);margin-left:2px">°C</span>
    </div>
  </div>

  <!-- Street + Location grouped & centered -->
  <div style="flex:4;display:flex;align-items:stretch;justify-content:center;border-right:1px solid rgba(255,255,255,0.15);position:relative;z-index:2;">
    <div style="display:flex;flex-direction:column;justify-content:center;padding:0 16px;border-right:1px solid rgba(255,255,255,0.1)">
      <div class="bar-label">Street</div>
      <div class="bar-val" style="font-size:34px" id="val-street">Locating...</div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center;padding:0 16px;">
      <div class="bar-label">Location</div>
      <div class="bar-val" style="font-size:34px">
        <span class="loc-dot"></span><span id="val-city">--</span>
      </div>
    </div>
  </div>

  <!-- Rollin' 18 — far right of bar -->
  <div class="bar-col" style="align-items:flex-end;padding-right:24px;flex:1.2">
    <div id="brand-shadow-box">
      <div id="brand-name">Rollin' 18</div>
      <div id="brand-tagline">Live on the Road</div>
    </div>
  </div>

</div>

<script>
  let lat=null, lon=null;
  let lastElev=0, lastTemp=0, lastGeo=0, lastTz=0;
  let mapIndex=0, mapCountdown=10, mapStarted=false, mapInterval=null;
  let isMoving = false;
  const CIRC = 2 * Math.PI * 7;

  // USA (7s) → State (10s) → Street (15s)
  const MAP_SEQ = [
    { name: 'USA View',   span: 28.0,  dur: 7  },
    { name: 'State View', span: 1.8,   dur: 10 },
    { name: 'Street View',span: 0.003, dur: 15 },
  ];
  // Stopped sequence: USA (7s) → State (10s) loop
  const MAP_STOPPED_SEQ = [
    { name: 'USA View',   span: 28.0, dur: 7  },
    { name: 'State View', span: 1.8,  dur: 10 },
  ];
  let stoppedMapIndex = 0;
  let stoppedMapCountdown = 7;
  let stoppedMapInterval = null;

  let userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

  function updateClock() {
    const now  = new Date();
    const opts = { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true, timeZone: userTimezone };
    const parts = Intl.DateTimeFormat('en-US', opts).formatToParts(now);
    const h  = parts.find(p=>p.type==='hour')?.value || '--';
    const m  = parts.find(p=>p.type==='minute')?.value || '--';
    const s  = parts.find(p=>p.type==='second')?.value || '--';
    const ap = parts.find(p=>p.type==='dayperiod' || p.type==='dayPeriod')?.value || '';
    document.getElementById('clock-time').textContent = `${h}:${m}:${s} ${ap}`;

    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const d = new Date(now.toLocaleString('en-US', { timeZone: userTimezone }));
    document.getElementById('clock-date').textContent =
      `${days[d.getDay()]}  ·  ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

    const tz = Intl.DateTimeFormat('en-US', { timeZoneName:'short', timeZone: userTimezone })
      .formatToParts(now).find(p=>p.type==='timeZoneName')?.value || '';
    document.getElementById('clock-tz').textContent = tz;
  }

  async function fetchTimezone(lt, ln) {
    if (Date.now()-lastTz < 5*60*1000) return; lastTz=Date.now();
    // Use timeapi.io to get accurate timezone from GPS coords (free, no key needed)
    try {
      const r = await fetch(`https://timeapi.io/api/TimeZone/coordinate?latitude=${lt}&longitude=${ln}`);
      const d = await r.json();
      if (d.timeZone) userTimezone = d.timeZone;
    } catch(e) {
      // Fall back to device timezone — already set as default
    }
  }
  updateClock();
  setInterval(updateClock, 1000);

  function degToCompass(d) {
    return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
  }

  function renderMap(lt, ln, view) {
    const url = `https://www.openstreetmap.org/export/embed.html?bbox=${ln-view.span},${lt-view.span*0.75},${ln+view.span},${lt+view.span*0.75}&layer=mapnik&marker=${lt},${ln}`;
    const el  = document.getElementById('map-content');
    el.classList.remove('map-fading');
    void el.offsetWidth;
    el.classList.add('map-fading');
    el.innerHTML = `<iframe src="${url}" scrolling="no"></iframe>`;
    document.getElementById('map-title').textContent = view.name;
  }

  function updateRing() {
    const frac = mapCountdown / MAP_SEQ[mapIndex].dur;
    const prog = document.getElementById('timer-progress');
    prog.style.strokeDasharray  = CIRC;
    prog.style.strokeDashoffset = CIRC * (1 - frac);
    document.getElementById('timer-label').textContent = `${mapCountdown}s`;
  }

  function startStoppedMap() {
    if (stoppedMapInterval) { clearInterval(stoppedMapInterval); stoppedMapInterval = null; }
    stoppedMapIndex    = 0;
    stoppedMapCountdown = MAP_STOPPED_SEQ[0].dur;
    renderMap(lat, lon, MAP_STOPPED_SEQ[stoppedMapIndex]);
    updateRing();
    stoppedMapInterval = setInterval(() => {
      if (isMoving) {
        clearInterval(stoppedMapInterval); stoppedMapInterval = null;
        return;
      }
      stoppedMapCountdown--;
      // update ring for stopped sequence
      const prog = document.getElementById('timer-progress');
      const frac = stoppedMapCountdown / MAP_STOPPED_SEQ[stoppedMapIndex].dur;
      prog.style.strokeDasharray  = CIRC;
      prog.style.strokeDashoffset = CIRC * (1 - frac);
      document.getElementById('timer-label').textContent = `${stoppedMapCountdown}s`;
      if (stoppedMapCountdown <= 0) {
        stoppedMapIndex     = (stoppedMapIndex + 1) % MAP_STOPPED_SEQ.length;
        stoppedMapCountdown = MAP_STOPPED_SEQ[stoppedMapIndex].dur;
        renderMap(lat, lon, MAP_STOPPED_SEQ[stoppedMapIndex]);
      }
    }, 1000);
  }

  function startMap() {
    if (!lat) return;
    // Clear both interval types
    if (mapInterval)        { clearInterval(mapInterval);        mapInterval = null; }
    if (stoppedMapInterval) { clearInterval(stoppedMapInterval); stoppedMapInterval = null; }

    if (!isMoving) {
      startStoppedMap();
      return;
    }

    // Moving — rotate USA → State → Street
    mapIndex     = 0;
    mapCountdown = MAP_SEQ[0].dur;
    renderMap(lat, lon, MAP_SEQ[mapIndex]);
    updateRing();
    mapInterval = setInterval(() => {
      if (!isMoving) {
        clearInterval(mapInterval); mapInterval = null;
        startStoppedMap();
        return;
      }
      mapCountdown--;
      updateRing();
      if (mapCountdown <= 0) {
        mapIndex     = (mapIndex + 1) % MAP_SEQ.length;
        mapCountdown = MAP_SEQ[mapIndex].dur;
        renderMap(lat, lon, MAP_SEQ[mapIndex]);
      }
    }, 1000);
  }

  async function fetchWeather(lt, ln) {
    if (Date.now()-lastTemp < 5*60*1000) return; lastTemp=Date.now();
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lt}&longitude=${ln}&current_weather=true&temperature_unit=fahrenheit&windspeed_unit=mph`);
      const d = await r.json();
      const tempF = Math.round(d.current_weather.temperature);
      const tempC = Math.round((tempF - 32) * 5 / 9);
      document.getElementById('val-temp-f').textContent = tempF;
      document.getElementById('val-temp-c').textContent = tempC;
      document.getElementById('dot-temp').style.background = '#ff6a00';
      document.getElementById('dot-temp').style.boxShadow  = '0 0 6px #ff6a00';
    } catch(e){ document.getElementById('dot-temp').style.background='#f87171'; }
  }

  async function fetchGeocode(lt, ln) {
    if (Date.now()-lastGeo < 30000) return; lastGeo=Date.now();
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lt}&lon=${ln}&format=json`);
      const d = await r.json();
      const a = d.address;
      const street = a.road || a.pedestrian || a.county || 'Unknown Road';
      const city   = a.city || a.town || a.village || a.county || '';
      const state  = a.state_code || a.state || '';

      // Store for toggling
      window._lastStreet = street;
      window._lastCity   = `${city}${city&&state?', ':''}${state}`;
      updateLocationDisplay();
    } catch(e){}
  }

  function updateLocationDisplay() {
    const streetCol = document.getElementById('col-street');
    const cityEl    = document.getElementById('val-city');
    const streetEl  = document.getElementById('val-street');
    if (isMoving) {
      streetCol.style.display = '';
      streetEl.textContent    = window._lastStreet || 'Locating...';
    } else {
      // Stopped — hide exact street name only
      streetCol.style.display = '';
      streetEl.textContent    = 'Somewhere USA 🇺🇸';
    }
    // Always show real city/state
    cityEl.textContent = window._lastCity || '--';
  }

  function onPosition(pos) {
    lat = pos.coords.latitude; lon = pos.coords.longitude;
    const { speed } = pos.coords;

    const mph = speed!=null&&speed>=0 ? Math.round(speed*2.23694) : 0;

    // Detect moving vs stopped (threshold: 2 mph)
    const wasMoving = isMoving;
    isMoving = mph >= 2;

    fetchWeather(lat,lon);
    fetchGeocode(lat,lon);
    fetchTimezone(lat,lon);
    updateLocationDisplay();

    if (!mapStarted) {
      mapStarted = true;
      startMap();
    } else if (wasMoving !== isMoving) {
      startMap();
    }
  }

  function onError(err) {
    const msg = err ? (err.code === 1 ? 'Location denied' : err.code === 2 ? 'GPS unavailable' : 'GPS timeout') : 'GPS Error';
    document.getElementById('val-street').textContent = msg;
    document.getElementById('val-city').textContent   = 'Check location settings';
    // Show red on all dots
    ['dot-temp'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.background = '#f87171';
    });
  }

  function startGPS() {
    document.getElementById('gps-prompt').classList.add('hidden');

    if (!('geolocation' in navigator)) {
      onError({code:2, message:'Geolocation not supported'});
      return;
    }

    navigator.geolocation.watchPosition(
      onPosition,
      onError,
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
    );
  }

  document.getElementById('start-btn').addEventListener('click', startGPS);

  // Also try auto-starting on page load in case permission already granted
  window.addEventListener('load', () => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          // Permission already granted — hide prompt and start
          document.getElementById('gps-prompt').classList.add('hidden');
          onPosition(pos);
          navigator.geolocation.watchPosition(onPosition, onError, {
            enableHighAccuracy: true, timeout: 30000, maximumAge: 0
          });
        },
        () => { /* not yet granted — wait for button tap */ },
        { enableHighAccuracy: true, timeout: 3000, maximumAge: 60000 }
      );
    }
  });
</script>
</body>
</html>
