<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollin' 18 GPS</title>
<style>
  body { background:#111; color:#fff; font-family:Arial,sans-serif; text-align:center; padding:40px 20px; }
  h1   { font-size:28px; color:#ff6a00; margin-bottom:6px; }
  #box { background:#1a1a1a; border:2px solid #ff6a00; border-radius:12px; padding:20px; margin:20px 0; font-size:16px; line-height:2; }
  p    { color:#888; font-size:13px; margin-top:16px; line-height:1.6; }
  .ok  { color:#4ade80; } .err { color:#f87171; } .wait { color:#f59e0b; }
</style>
</head>
<body>
<h1>Rollin' 18</h1>
<div id="box"><span class="wait">⏳ Starting GPS...</span></div>
<p>Keep this tab open in Safari while streaming.<br>Press home button to minimize — do NOT close.</p>
<script>
  var box = document.getElementById('box');
  var lastW = 0, lastG = 0;

  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
  }

  function onPos(pos) {
    var c = pos.coords;
    var mph = (c.speed != null && c.speed >= 0) ? Math.round(c.speed * 2.23694) : 0;
    save('r18_gps', { lat:c.latitude, lon:c.longitude, mph:mph, ts:Date.now() });

    box.innerHTML =
      '<span class="ok">✅ GPS Active</span><br>' +
      c.latitude.toFixed(4) + ', ' + c.longitude.toFixed(4) + '<br>' +
      'Speed: ' + mph + ' mph<br>' +
      new Date().toLocaleTimeString();

    var now = Date.now();
    if (now - lastW > 5*60*1000) { lastW = now; fetchWeather(c.latitude, c.longitude); }
    if (now - lastG > 30000)     { lastG = now; fetchGeo(c.latitude, c.longitude); }
  }

  function onErr(e) {
    box.innerHTML = '<span class="err">❌ ' + e.message + '</span>';
  }

  function fetchWeather(lat, lon) {
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var f = Math.round(d.current_weather.temperature);
        save('r18_wx', { f:f, c:Math.round((f-32)*5/9) });
      }).catch(function(){});
  }

  function fetchGeo(lat, lon) {
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var a = d.address;
        save('r18_geo', {
          street: a.road||a.pedestrian||a.county||'',
          city:   a.city||a.town||a.village||a.county||'',
          state:  a.state_code||a.state||''
        });
      }).catch(function(){});
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(onPos, onErr, {
      enableHighAccuracy: true, timeout: 30000, maximumAge: 0
    });
  } else {
    box.innerHTML = '<span class="err">❌ GPS not supported</span>';
  }
</script>
</body>
</html>
