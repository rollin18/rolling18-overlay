<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollin' 18 Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px; height: 1920px;
    overflow: hidden; background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
    position: relative;
  }

  :root {
    --yellow: #f5c518;
    --dark: rgba(15,15,20,0.80);
    --dark-solid: rgba(10,10,14,0.95);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.55);
  }

  /* ── TEMP + TIME row ── */
  #info-row {
    position: absolute;
    top: 160px; left: 0; right: 0;
    height: 110px;
    background: var(--dark);
    border-top: 2px solid rgba(245,197,24,0.3);
    border-bottom: 2px solid rgba(245,197,24,0.3);
    display: flex; align-items: stretch;
  }
  .info-col {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 0 32px;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .info-col:last-child { border-right: none; align-items: flex-end; }
  .info-label {
    font-family: 'Barlow', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--yellow); opacity: 0.75; margin-bottom: 3px;
  }
  .info-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px; font-weight: 700;
    color: var(--text); line-height: 0.95; font-variant-numeric: tabular-nums;
  }
  .info-sub { font-size: 22px; color: var(--text-dim); margin-top: 2px; }

  /* ── BOTTOM PANEL — switches between map and location ── */
  #bottom-panel {
    position: absolute;
    top: 278px; left: 0; right: 0;
    height: 480px;
    overflow: hidden;
  }

  /* Map view */
  #bottom-map {
    position: absolute; inset: 0;
    background: var(--dark);
    border-top: 3px solid var(--yellow);
    transition: opacity 0.8s ease;
  }
  #bottom-map-header {
    position: absolute; top: 0; left: 0; right: 0; height: 48px;
    background: var(--dark-solid);
    border-bottom: 1px solid rgba(245,197,24,0.3);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; z-index: 10;
  }
  #bottom-map-title { font-size:14px; font-weight:700; letter-spacing:0.2em; color:var(--yellow); text-transform:uppercase; }
  #bottom-map-timer-wrap { display:flex; align-items:center; gap:8px; }
  #bottom-map-timer-label { font-size:13px; color:var(--text-dim); }
  .timer-ring-lg { width:28px; height:28px; }
  .timer-ring-lg circle { fill:none; stroke:rgba(245,197,24,0.2); stroke-width:3; }
  .timer-ring-lg .progress {
    stroke:var(--yellow); stroke-dasharray:69; stroke-dashoffset:0;
    stroke-linecap:round; transform:rotate(-90deg); transform-origin:center;
    transition:stroke-dashoffset 1s linear;
  }
  #bottom-map-content {
    position: absolute; top:48px; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center;
  }
  #bottom-map-content iframe { width:100%; height:100%; border:none; pointer-events:none; }
  .nesw-lg {
    position:absolute; z-index:10; font-size:18px; font-weight:700; color:var(--yellow);
    pointer-events:none; text-shadow:0 1px 5px rgba(0,0,0,0.95);
  }
  .nesw-lg.n { top:52px; left:50%; transform:translateX(-50%); }
  .nesw-lg.s { bottom:10px; left:50%; transform:translateX(-50%); }
  .nesw-lg.e { right:10px; top:50%; transform:translateY(-50%); margin-top:24px; }
  .nesw-lg.w { left:10px; top:50%; transform:translateY(-50%); margin-top:24px; }

  /* Location view */
  #bottom-location {
    position: absolute; inset: 0;
    background: var(--dark);
    border-top: 3px solid var(--yellow);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 48px;
    transition: opacity 0.8s ease;
  }
  .loc-big-label {
    font-family: 'Barlow', sans-serif;
    font-size: 18px; font-weight: 600;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--yellow); opacity: 0.75;
  }
  .loc-big-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 80px; font-weight: 700;
    color: var(--text); line-height: 1;
    text-align: center; padding: 0 40px;
  }
  .loc-big-street {
    font-size: 80px;
    color: var(--text-dim);
  }
  .loc-divider {
    width: 80%; height: 2px;
    background: rgba(245,197,24,0.2);
  }
  .loc-dot-big {
    display:inline-block; width:14px; height:14px; border-radius:50%;
    background:var(--yellow); margin-right:14px; vertical-align:middle;
    animation:pulse 2s ease-in-out infinite;
  }
  /* panel switch timer bar */
  #switch-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 6px;
    background: rgba(245,197,24,0.2);
  }
  #switch-progress {
    height: 100%; background: var(--yellow);
    transition: width 1s linear;
  }

  /* fade classes */
  .panel-hidden { opacity: 0; pointer-events: none; }
  .panel-visible { opacity: 1; pointer-events: auto; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes mapFade { from{opacity:0} to{opacity:1} }
  .map-fading { animation:mapFade 0.7s ease both; }

  /* stripe texture */
  .stripe::after {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(
      -45deg,
      rgba(180,20,20,0.08) 0px, rgba(180,20,20,0.08) 3px,
      transparent 3px, transparent 10px
    );
    pointer-events:none;
  }
</style>
</head>
<body>

<!-- Temp + Time -->
<div id="info-row">
  <div class="info-col">
    <div class="info-label">Temp <span id="dot-temp" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#333;vertical-align:middle;margin-left:3px"></span></div>
    <div class="info-val">
      <span id="val-temp-f">--</span><span style="font-size:24px;color:var(--text-dim)">°F</span>
    </div>
  </div>
  <div class="info-col">
    <div class="info-label">Time</div>
    <div class="info-val" id="val-time">--:-- --</div>
    <div class="info-sub" id="val-tz">--</div>
  </div>
</div>

<!-- Bottom Panel: Location only -->
<div id="bottom-panel">

  <!-- Location view always visible -->
  <div id="bottom-location" class="panel-visible stripe">
    <div style="text-align:center" id="loc-panel-content">
      <div class="loc-big-label">Location</div>
      <div class="loc-big-val"><span class="loc-dot-big"></span><span id="val-city">--</span></div>
    </div>
    <div class="loc-divider" id="loc-divider"></div>
    <div style="text-align:center" id="street-panel-content">
      <div class="loc-big-label">Street</div>
      <div class="loc-big-val loc-big-street" id="val-street">Locating...</div>
    </div>
  </div>

</div>

<script>
  function scale(){
    var s=Math.min(window.innerWidth/1080,window.innerHeight/1920);
    document.body.style.transform='scale('+s+')';
    document.body.style.transformOrigin='top left';
    document.body.style.width='1080px';
    document.body.style.height='1920px';
  }
  scale(); window.addEventListener('resize',scale);

  var lat=null,lon=null,isMoving=false,mapStarted=false;
  var lastTemp=0,lastGeo=0,lastTz=0;
  var CIRC_SM=2*Math.PI*7, CIRC_LG=2*Math.PI*9;
  var userTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;

  // Home zone
  var HOME_LAT=40.0423,HOME_LON=-75.5135,HOME_RADIUS=1.0;
  function distMiles(a,b,c,d){
    var R=3958.8,dL=(c-a)*Math.PI/180,dO=(d-b)*Math.PI/180;
    var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }
  function nearHome(){return lat&&lon&&distMiles(lat,lon,HOME_LAT,HOME_LON)<=HOME_RADIUS;}

  var MAP_HOME=[{name:'USA View',span:28.0,dur:7},{name:'State View',span:1.8,dur:10}];
  var MAP_MOVE=[{name:'USA View',span:28.0,dur:7},{name:'State View',span:1.8,dur:10},{name:'Street View',span:0.003,dur:15}];
  var MAP_STOP=[{name:'USA View',span:28.0,dur:7},{name:'State View',span:1.8,dur:10}];

  // ── Clock ──
  function tick(){
    var now=new Date();
    var opts={hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true,timeZone:userTZ};
    var pts=Intl.DateTimeFormat('en-US',opts).formatToParts(now);
    var get=function(t){return(pts.find(function(p){return p.type===t;})||{}).value||'--';};
    var ap=(pts.find(function(p){return p.type==='dayperiod'||p.type==='dayPeriod';})||{}).value||'';
    var tz=(Intl.DateTimeFormat('en-US',{timeZoneName:'short',timeZone:userTZ}).formatToParts(now).find(function(p){return p.type==='timeZoneName';})||{}).value||'';
    document.getElementById('val-time').textContent=get('hour')+':'+get('minute')+':'+get('second')+' '+ap;
    document.getElementById('val-tz').textContent=tz;
  }
  tick(); setInterval(tick,1000);

  // ── Bottom panel: alternates map/location every 30s ──
  var PANEL_DUR=30;
  var panelCd=PANEL_DUR, showingMap=true, panelInterval=null;

  function renderBottomMap(lt,ln,v){
    var url='https://www.openstreetmap.org/export/embed.html?bbox='+(ln-v.span)+','+(lt-v.span*0.75)+','+(ln+v.span)+','+(lt+v.span*0.75)+'&layer=mapnik&marker='+lt+','+ln;
    var el=document.getElementById('bottom-map-content');
    el.classList.remove('map-fading'); void el.offsetWidth; el.classList.add('map-fading');
    el.innerHTML='<iframe src="'+url+'" scrolling="no"></iframe>';
    document.getElementById('bottom-map-title').textContent=v.name;
  }

  var bottomMapIdx=0, bottomMapCd=0, bottomMapInterval=null;
  function startBottomMap(){
    if(!lat) return;
    if(bottomMapInterval){clearInterval(bottomMapInterval);bottomMapInterval=null;}
    var seq=nearHome()?MAP_HOME:(isMoving?MAP_MOVE:MAP_STOP);
    bottomMapIdx=0; bottomMapCd=seq[0].dur;
    renderBottomMap(lat,lon,seq[bottomMapIdx]);
    document.getElementById('bottom-map-timer-label').textContent=bottomMapCd+'s';
    var p=document.getElementById('bottom-timer-progress');
    p.style.strokeDasharray=CIRC_LG; p.style.strokeDashoffset=CIRC_LG*(1-bottomMapCd/seq[bottomMapIdx].dur);
    bottomMapInterval=setInterval(function(){
      if(!showingMap) return;
      bottomMapCd--;
      var seq2=nearHome()?MAP_HOME:(isMoving?MAP_MOVE:MAP_STOP);
      var p2=document.getElementById('bottom-timer-progress');
      p2.style.strokeDasharray=CIRC_LG; p2.style.strokeDashoffset=CIRC_LG*(1-bottomMapCd/seq2[bottomMapIdx].dur);
      document.getElementById('bottom-map-timer-label').textContent=bottomMapCd+'s';
      if(bottomMapCd<=0){bottomMapIdx=(bottomMapIdx+1)%seq2.length;bottomMapCd=seq2[bottomMapIdx].dur;renderBottomMap(lat,lon,seq2[bottomMapIdx]);}
    },1000);
  }

  function switchPanel(){
    showingMap=!showingMap;
    var mapEl=document.getElementById('bottom-map');
    var locEl=document.getElementById('bottom-location');
    if(showingMap){
      mapEl.className='panel-visible stripe'; locEl.className='panel-hidden stripe';
      // When home only show state view
      if(nearHome()){
        renderBottomMap(lat,lon,{name:'State View',span:1.8,dur:30});
        document.getElementById('bottom-map-title').textContent='State View';
      } else {
        startBottomMap();
      }
    } else {
      mapEl.className='panel-hidden stripe'; locEl.className='panel-visible stripe';
    }
    panelCd=PANEL_DUR;
    document.getElementById('switch-progress').style.width='100%';
  }

  function startPanelTimer(){
    if(panelInterval){clearInterval(panelInterval);panelInterval=null;}
    panelCd=PANEL_DUR;
    document.getElementById('switch-progress').style.width='100%';
    panelInterval=setInterval(function(){
      panelCd--;
      document.getElementById('switch-progress').style.width=Math.round(panelCd/PANEL_DUR*100)+'%';
      if(panelCd<=0) switchPanel();
    },1000);
  }

  // ── Data fetching ──
  function fetchWeather(lt,ln){
    if(Date.now()-lastTemp<5*60*1000) return; lastTemp=Date.now();
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lt+'&longitude='+ln+'&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r){return r.json();})
      .then(function(d){
        var f=Math.round(d.current_weather.temperature);
        document.getElementById('val-temp-f').textContent=f;
        document.getElementById('val-temp-c').textContent=Math.round((f-32)*5/9);
        document.getElementById('dot-temp').style.background='#f5c518';
      }).catch(function(){document.getElementById('dot-temp').style.background='#f87171';});
  }

  function fetchGeo(lt,ln){
    if(Date.now()-lastGeo<30000) return; lastGeo=Date.now();
    // Don't even fetch geocode when near home — no point
    if(nearHome()) { updateLoc(); return; }
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lt+'&lon='+ln+'&format=json')
      .then(function(r){return r.json();})
      .then(function(d){
        var a=d.address;
        window._street=a.road||a.pedestrian||a.county||'';
        var city=a.city||a.town||a.village||a.county||'';
        var state=a.state_code||a.state||'';
        window._city=city+(city&&state?', ':'')+state;
        updateLoc();
      }).catch(function(){});
  }

  function updateLoc(){
    var se  = document.getElementById('val-street');
    var ce  = document.getElementById('val-city');
    var lp  = document.getElementById('loc-panel-content');
    var sp  = document.getElementById('street-panel-content');
    var div = document.getElementById('loc-divider');

    // Near home OR city contains Malvern — show WE ARE HOME
    var atHome = nearHome() || (window._city && window._city.toLowerCase().indexOf('malvern') >= 0);

    if(atHome){
      if(lp)  lp.style.display  = 'none';
      if(sp)  sp.style.display  = 'none';
      if(div) div.style.display = 'none';
      if(se)  se.textContent = '';
      if(ce)  ce.textContent = '';
      var loc = document.getElementById('bottom-location');
      var existing = document.getElementById('home-msg');
      if(!existing && loc) {
        var msg = document.createElement('div');
        msg.id = 'home-msg';
        msg.style.cssText = 'text-align:center;padding:0 40px;';
        msg.innerHTML = '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:120px;font-weight:700;line-height:1;background:linear-gradient(180deg,#ff6a00,#cc0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 20px rgba(255,106,0,0.6))">WE ARE<br>HOME</div><div style="font-size:80px;margin-top:16px">🏠</div>';
        loc.appendChild(msg);
      }
    } else {
      if(lp)  lp.style.display  = '';
      if(sp)  sp.style.display  = '';
      if(div) div.style.display = '';
      var existing2 = document.getElementById('home-msg');
      if(existing2) existing2.remove();
      if(!isMoving){
        if(se) se.textContent = 'Somewhere USA 🇺🇸';
        if(ce) ce.textContent = window._city||'--';
      } else {
        if(se) se.textContent = window._street||'Locating...';
        if(ce) ce.textContent = window._city||'--';
      }
    }
  }

  function fetchTZ(lt,ln){
    if(Date.now()-lastTz<5*60*1000) return; lastTz=Date.now();
    fetch('https://timeapi.io/api/TimeZone/coordinate?latitude='+lt+'&longitude='+ln)
      .then(function(r){return r.json();})
      .then(function(d){if(d.timeZone) userTZ=d.timeZone;})
      .catch(function(){});
  }

  function onPos(pos){
    var c=pos.coords;
    lat=c.latitude; lon=c.longitude;
    var mph=(c.speed!=null&&c.speed>=0)?Math.round(c.speed*2.23694):0;
    var was=isMoving; isMoving=mph>=2;
    fetchWeather(lat,lon); fetchGeo(lat,lon); fetchTZ(lat,lon); updateLoc();
    if(!mapStarted){
      mapStarted=true;
      startBottomMap();
      startPanelTimer();
    } else if(was!==isMoving){
      startBottomMap();
    }
  }

  function onErr(e){
    var msg=e?(e.code===1?'Location denied':e.code===2?'GPS unavailable':'GPS timeout'):'GPS Error';
    document.getElementById('val-street').textContent=msg;
    document.getElementById('dot-temp').style.background='#f87171';
  }

  window.addEventListener('load',function(){
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,timeout:30000,maximumAge:0});
    } else { onErr(null); }
  });
</script>
</body>
</html>
