<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Test</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 24px;
    padding: 40px;
    text-align: center;
  }
  #status {
    background: #222;
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
    font-size: 20px;
    line-height: 1.8;
  }
  button {
    background: #ff6a00;
    color: #000;
    border: none;
    padding: 20px 40px;
    font-size: 24px;
    font-weight: bold;
    border-radius: 10px;
    width: 100%;
    margin: 10px 0;
  }
</style>
</head>
<body>

<h2>GPS Test Page</h2>
<div id="status">Tap the button below</div>

<button onclick="testGPS()">TEST GPS</button>
<button onclick="testWatch()">WATCH GPS</button>

<script>
  function log(msg) {
    document.getElementById('status').innerHTML += '<br>' + msg;
  }

  function testGPS() {
    document.getElementById('status').innerHTML = 'Testing...';
    if (!navigator.geolocation) {
      log('❌ Geolocation NOT supported');
      return;
    }
    log('✅ Geolocation supported');
    log('Requesting position...');

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        log('✅ GOT POSITION!');
        log('Lat: ' + pos.coords.latitude.toFixed(4));
        log('Lon: ' + pos.coords.longitude.toFixed(4));
        log('Accuracy: ' + Math.round(pos.coords.accuracy) + 'm');
        log('Speed: ' + pos.coords.speed);
        log('Altitude: ' + pos.coords.altitude);
      },
      function(err) {
        log('❌ ERROR: ' + err.message);
        log('Error code: ' + err.code);
        if (err.code === 1) log('→ PERMISSION DENIED');
        if (err.code === 2) log('→ POSITION UNAVAILABLE');
        if (err.code === 3) log('→ TIMEOUT');
      },
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
    );
  }

  function testWatch() {
    document.getElementById('status').innerHTML = 'Watching...';
    navigator.geolocation.watchPosition(
      function(pos) {
        document.getElementById('status').innerHTML =
          '✅ LIVE GPS WORKING!<br>' +
          'Lat: ' + pos.coords.latitude.toFixed(4) + '<br>' +
          'Lon: ' + pos.coords.longitude.toFixed(4) + '<br>' +
          'Accuracy: ' + Math.round(pos.coords.accuracy) + 'm<br>' +
          'Speed: ' + pos.coords.speed + '<br>' +
          'Time: ' + new Date().toLocaleTimeString();
      },
      function(err) {
        document.getElementById('status').innerHTML = '❌ ' + err.message + ' (code ' + err.code + ')';
      },
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
    );
  }
</script>
</body>
</html>
