<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rollin' 18 GPS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 30px;
    text-align: center;
  }
  .logo {
    font-size: 48px;
    font-weight: bold;
    color: #ff6a00;
    margin-bottom: 8px;
  }
  .sub { font-size: 14px; color: #666; margin-bottom: 30px; }
  .status-box {
    width: 100%;
    max-width: 340px;
    background: #1a1a1a;
    border: 2px solid #ff6a00;
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 24px;
    font-size: 18px;
    line-height: 2.2;
  }
  .green { color: #4ade80; font-size: 22px; }
  .amber { color: #f59e0b; font-size: 22px; }
  .red   { color: #f87171; font-size: 22px; }
  .info  { font-size: 13px; color: #555; line-height: 1.8; max-width: 300px; }
  .keep-open {
    background: #ff6a00;
    color: #000;
    font-size: 16px;
    font-weight: bold;
    padding: 14px 28px;
    border-radius: 10px;
    margin-top: 20px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="logo">Rollin' 18</div>
  <div class="sub">GPS DATA FEED</div>

  <div class="status-box" id="box">
    <span class="amber">⏳ Starting GPS...</span>
  </div>

  <div class="info">
    Keep this page open in Safari.<br>
    Press Home to minimize — do not close.
  </div>

  <div class="keep-open">MINIMIZE SAFARI AFTER GPS ACTIVE</div>

<script>
  var box = document.getElementById('box');
  var lastW = 0, lastG = 0;

  function save(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
  }

  function onPos(pos) {
    var c   = pos.coords;
    var mph = (c.speed != null && c.speed >= 0) ? Math.round(c.speed * 2.23694) : 0;
    save('r18_gps', { lat: c.latitude, lon: c.longitude, mph: mph, ts: Date.now() });

    box.innerHTML =
      '<span class="green">✅ GPS ACTIVE</span><br>' +
      c.latitude.toFixed(4) + ', ' + c.longitude.toFixed(4) + '<br>' +
      'Speed: ' + mph + ' mph<br>' +
      '<span style="font-size:14px;color:#888">' + new Date().toLocaleTimeString() + '</span>';

    var now = Date.now();
    if (now - lastW > 5 * 60 * 1000) { lastW = now; doWeather(c.latitude, c.longitude); }
    if (now - lastG > 30000)          { lastG = now; doGeo(c.latitude, c.longitude); }
  }

  function onErr(e) {
    box.innerHTML = '<span class="red">❌ ' + (e ? e.message : 'GPS Error') + '</span><br><span style="font-size:14px;color:#888">Check Settings → Privacy → Location Services → Safari</span>';
  }

  function doWeather(lat, lon) {
    fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var f = Math.round(d.current_weather.temperature);
        save('r18_wx', { f: f, c: Math.round((f - 32) * 5 / 9) });
      }).catch(function() {});
  }

  function doGeo(lat, lon) {
    fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var a = d.address;
        save('r18_geo', {
          street: a.road || a.pedestrian || a.county || '',
          city:   a.city || a.town || a.village || a.county || '',
          state:  a.state_code || a.state || ''
        });
      }).catch(function() {});
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(onPos, onErr, {
      enableHighAccuracy: true,
      timeout: 30000,
      maximumAge: 0
    });
  } else {
    box.innerHTML = '<span class="red">❌ GPS not supported on this device</span>';
  }
</script>
</body>
</html>
